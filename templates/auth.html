<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FraudSentinel AI — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05050f;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --blue: #6C63FF; --blue-light: #8B85FF;
    --cyan: #00D4FF; --red: #FF4D6D; --green: #00F5A0;
    --text: #E8E8F0; --muted: rgba(232,232,240,0.5);
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; overflow-x: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.18; animation: drift 18s ease-in-out infinite alternate; }
  .orb-1 { width: 500px; height: 500px; background: #6C63FF; top: -150px; left: -100px; }
  .orb-2 { width: 400px; height: 400px; background: #00D4FF; bottom: -150px; right: -80px; animation-delay: -9s; }
  @keyframes drift { 0%{transform:translate(0,0)} 100%{transform:translate(30px,25px)} }

  .auth-container {
    position: relative; z-index: 2;
    width: 100%; max-width: 420px; padding: 2rem;
  }

  .logo-block {
    text-align: center; margin-bottom: 2rem;
  }
  .logo-block a {
    display: inline-flex; align-items: center; gap: 0.6rem;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.15rem;
    color: var(--text); text-decoration: none;
  }
  .logo-shield {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--blue), var(--cyan));
    border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .logo-block p { color: var(--muted); font-size: 0.9rem; margin-top: 0.5rem; }

  .auth-card {
    background: rgba(15,15,30,0.8);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
    backdrop-filter: blur(20px);
  }

  .tabs {
    display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem;
  }
  .tab-btn {
    flex: 1; background: transparent; border: none; padding: 0.8rem;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600;
    color: var(--muted); cursor: pointer; transition: all 0.2s;
    border-bottom: 2px solid transparent;
  }
  .tab-btn.active { color: var(--blue-light); border-bottom-color: var(--blue-light); }
  .tab-btn:hover { color: var(--text); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; animation: fadeUp 0.3s ease; }

  .field { margin-bottom: 1.2rem; }
  .field label {
    display: block; font-size: 0.85rem; font-weight: 600;
    margin-bottom: 0.4rem; color: var(--text);
  }
  .field input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus {
    border-color: rgba(108,99,255,0.5);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.1);
  }
  .field input::placeholder { color: var(--muted); }

  .btn-submit {
    width: 100%; padding: 0.9rem;
    background: linear-gradient(135deg, var(--blue), var(--blue-light));
    color: white; border: none; border-radius: 12px;
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.95rem;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(108,99,255,0.3);
    margin-top: 0.5rem;
  }
  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(108,99,255,0.5); }

  .msg {
    padding: 0.8rem; border-radius: 10px; font-size: 0.85rem; margin-bottom: 1rem; display: none;
  }
  .msg.show { display: block; animation: fadeUp 0.3s ease; }
  .msg.success { background: rgba(0,245,160,0.1); border: 1px solid rgba(0,245,160,0.3); color: var(--green); }
  .msg.error { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3); color: var(--red); }

  .divider {
    text-align: center; color: var(--muted); font-size: 0.8rem; margin: 1.5rem 0;
    position: relative;
  }
  .divider::before, .divider::after {
    content: ''; position: absolute; top: 50%; width: 40%; height: 1px;
    background: var(--border);
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }

  .guest-link {
    display: block; text-align: center; color: var(--muted); font-size: 0.85rem;
    text-decoration: none; transition: color 0.2s;
  }
  .guest-link:hover { color: var(--blue-light); }

  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>

<div class="auth-container">
  <div class="logo-block">
    <a href="/">
      <div class="logo-shield">🛡</div>
      FraudSentinel AI
    </a>
    <p>Sign in to track your scan history</p>
  </div>

  <div class="auth-card">
    <div class="msg" id="authMsg"></div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchAuthTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchAuthTab('register')">Create Account</button>
    </div>

    <!-- LOGIN -->
    <div class="tab-panel active" id="loginPanel">
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password">
      </div>
      <button class="btn-submit" onclick="doLogin()">Sign In →</button>
    </div>

    <!-- REGISTER -->
    <div class="tab-panel" id="registerPanel">
      <div class="field">
        <label>Username</label>
        <input type="text" id="regUsername" placeholder="Choose a username">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Create a password (min 6 chars)">
      </div>
      <button class="btn-submit" onclick="doRegister()">Create Account →</button>
    </div>

    <div class="divider">or</div>
    <a href="/analyze" class="guest-link">Continue as Guest →</a>
  </div>
</div>

<script>
function switchAuthTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`button[onclick="switchAuthTab('${tab}')"]`).classList.add('active');
  document.getElementById(tab + 'Panel').classList.add('active');
  hideMsg();
}

function showMsg(text, type) {
  const el = document.getElementById('authMsg');
  el.textContent = text;
  el.className = 'msg show ' + type;
}
function hideMsg() {
  document.getElementById('authMsg').className = 'msg';
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  if (!email || !password) { showMsg('Please fill in all fields.', 'error'); return; }

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (res.ok) {
      showMsg(`Welcome back, ${data.username}! Redirecting...`, 'success');
      setTimeout(() => window.location.href = '/analyze', 1000);
    } else {
      showMsg(data.error || 'Login failed.', 'error');
    }
  } catch(e) {
    showMsg('Connection error. Is the server running?', 'error');
  }
}

async function doRegister() {
  const username = document.getElementById('regUsername').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value.trim();
  if (!username || !email || !password) { showMsg('Please fill in all fields.', 'error'); return; }
  if (password.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }

  try {
    const res = await fetch('/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password })
    });
    const data = await res.json();
    if (res.ok) {
      showMsg('Account created! You can now sign in.', 'success');
      setTimeout(() => switchAuthTab('login'), 1500);
    } else {
      showMsg(data.error || 'Registration failed.', 'error');
    }
  } catch(e) {
    showMsg('Connection error. Is the server running?', 'error');
  }
}
</script>
</body>
</html>
