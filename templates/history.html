<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FraudSentinel AI — History</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05050f;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --blue: #6C63FF; --blue-light: #8B85FF;
    --cyan: #00D4FF; --red: #FF4D6D; --green: #00F5A0;
    --text: #E8E8F0; --muted: rgba(232,232,240,0.5);
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; overflow-x: hidden;
  }
  .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.18; animation: drift 18s ease-in-out infinite alternate; }
  .orb-1 { width: 500px; height: 500px; background: #6C63FF; top: -150px; left: -100px; }
  .orb-2 { width: 400px; height: 400px; background: #00D4FF; bottom: -150px; right: -80px; animation-delay: -9s; }
  @keyframes drift { 0%{transform:translate(0,0)} 100%{transform:translate(30px,25px)} }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 3rem;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    background: rgba(5,5,15,0.7);
  }
  .nav-logo {
    display: flex; align-items: center; gap: 0.6rem;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.15rem;
    color: var(--text); text-decoration: none; letter-spacing: -0.02em;
  }
  .logo-shield {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--blue), var(--cyan));
    border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px;
  }
  .nav-links { display: flex; align-items: center; gap: 2rem; }
  .nav-links a {
    color: var(--muted); text-decoration: none;
    font-size: 0.9rem; font-weight: 500; transition: color 0.2s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--blue-light); }

  main {
    position: relative; z-index: 2;
    padding: 7rem 3rem 4rem;
    max-width: 1200px; margin: 0 auto;
  }

  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
  }
  .page-header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.5rem, 3vw, 2rem); font-weight: 700; letter-spacing: -0.03em;
  }
  .btn-new {
    display: inline-flex; align-items: center; gap: 0.4rem;
    padding: 0.6rem 1.4rem;
    background: linear-gradient(135deg, var(--blue), var(--blue-light));
    color: white; border: none; border-radius: 100px;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.88rem;
    text-decoration: none; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(108,99,255,0.3);
  }
  .btn-new:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(108,99,255,0.5); }

  /* CONTROLS BAR */
  .controls-bar {
    display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; align-items: center;
    background: rgba(10,10,25,0.7); padding: 1rem; border-radius: 16px; border: 1px solid var(--border);
    backdrop-filter: blur(20px);
  }
  .controls-bar input, .controls-bar select {
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    color: var(--text); padding: 0.7rem 1rem; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none;
    transition: border-color 0.2s;
  }
  .controls-bar input:focus, .controls-bar select:focus { border-color: rgba(108,99,255,0.5); }
  .controls-bar input { flex: 1; min-width: 200px; }
  
  .stats-badges { display: flex; gap: 0.8rem; flex-wrap: wrap; margin-left: auto; }
  .stat-badge {
    padding: 0.5rem 1rem; background: var(--card); border: 1px solid var(--border);
    border-radius: 100px; font-size: 0.82rem; color: var(--muted);
  }
  .stat-badge strong { color: var(--text); font-weight: 600; }

  /* CARDS GRID */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.5rem;
  }

  .history-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.5rem;
    backdrop-filter: blur(20px);
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    display: flex; flex-direction: column; gap: 1rem;
    position: relative; overflow: hidden;
  }
  .history-card:hover { transform: translateY(-4px); }
  
  /* Risk Indicators */
  .history-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .card-fraud { border-color: rgba(255,77,109,0.2); }
  .card-fraud::before { background: linear-gradient(90deg, var(--red), #FF8FA3); }
  .card-fraud:hover { border-color: rgba(255,77,109,0.5); box-shadow: 0 10px 30px rgba(255,77,109,0.1); }
  
  .card-safe { border-color: rgba(0,245,160,0.2); }
  .card-safe::before { background: linear-gradient(90deg, var(--green), var(--cyan)); }
  .card-safe:hover { border-color: rgba(0,245,160,0.5); box-shadow: 0 10px 30px rgba(0,245,160,0.1); }
  
  .card-uncertain { border-color: rgba(255,200,0,0.2); }
  .card-uncertain::before { background: linear-gradient(90deg, #FFC800, #FFEA8C); }
  .card-uncertain:hover { border-color: rgba(255,200,0,0.5); box-shadow: 0 10px 30px rgba(255,200,0,0.1); }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
  .job-title { font-family: 'Syne', sans-serif; font-weight: 600; font-size: clamp(0.95rem, 1.5vw, 1.1rem); line-height: 1.3; }
  .company-name { font-size: 0.8rem; color: var(--muted); margin-top: 0.3rem; }
  
  .badge {
    padding: 0.3rem 0.7rem; border-radius: 100px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap;
  }
  .badge-fraud { background: rgba(255,77,109,0.1); color: var(--red); border: 1px solid rgba(255,77,109,0.3); }
  .badge-safe { background: rgba(0,245,160,0.1); color: var(--green); border: 1px solid rgba(0,245,160,0.3); }
  .badge-uncertain { background: rgba(255,200,0,0.1); color: #FFC800; border: 1px solid rgba(255,200,0,0.3); }

  .card-body { color: var(--muted); font-size: 0.88rem; line-height: 1.5; flex-grow: 1; }
  
  .card-footer {
    display: flex; justify-content: space-between; align-items: flex-end;
    border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1rem; margin-top: 0.5rem;
  }
  .footer-col { display: flex; flex-direction: column; gap: 0.2rem; }
  .meta-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .meta-value { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.9rem; }
  .val-fraud { color: var(--red); }
  .val-safe { color: var(--green); }
  .val-uncertain { color: #FFC800; }
  
  .timestamp { font-size: 0.75rem; color: var(--muted); text-align: right; }

  .empty-state { grid-column: 1 / -1; text-align: center; padding: 5rem 2rem; color: var(--muted); background: var(--card); border-radius: 20px; border: 1px dashed var(--border); }
  .empty-state .empty-icon { font-size: 3.5rem; margin-bottom: 1rem; opacity: 0.5; }
  .empty-state p { margin-bottom: 1.5rem; font-size: 1.1rem; }

  .loading-container { grid-column: 1 / -1; text-align: center; padding: 4rem; }
  .spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-export {
    display: inline-flex; align-items: center; gap: 0.4rem;
    padding: 0.6rem 1.4rem;
    background: transparent; border: 1px solid var(--border);
    color: var(--text); border-radius: 100px;
    font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.85rem;
    text-decoration: none; cursor: pointer; transition: all 0.2s;
  }
  .btn-export:hover { background: rgba(255,255,255,0.05); border-color: var(--blue); color: var(--blue-light); }

  .delete-btn {
    position: absolute; top: 0.8rem; right: 0.8rem;
    background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.2);
    color: var(--red); width: 28px; height: 28px; border-radius: 8px;
    font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s;
  }
  .history-card:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { background: rgba(255,77,109,0.2); }
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>

<nav>
  <a href="/" class="nav-logo">
    <div class="logo-shield">🛡</div>
    FraudSentinel AI
  </a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/analyze">Analyze</a>
    <a href="/history" class="active">History</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>Scan History</h1>
    <div style="display:flex;gap:0.8rem;align-items:center;">
      <a href="/api/history/export" class="btn-export">📥 Export CSV</a>
      <a href="/analyze" class="btn-new">+ New Analysis</a>
    </div>
  </div>

  <div class="controls-bar">
    <input type="text" id="searchInput" placeholder="Search jobs, companies, keywords...">
    <select id="statusFilter">
      <option value="all">All Statuses</option>
      <option value="fraud">Fraudulent</option>
      <option value="safe">Genuine</option>
      <option value="uncertain">Uncertain</option>
    </select>
    <select id="sortFilter">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
      <option value="highest_conf">Highest Confidence</option>
      <option value="lowest_conf">Lowest Confidence</option>
    </select>
    
    <div class="stats-badges" id="statsBar">
      <div class="stat-badge">Loading stats...</div>
    </div>
  </div>

  <div class="cards-grid" id="historyGrid">
    <div class="loading-container">
      <div class="spinner"></div>
      <p style="color:var(--muted)">Loading scan history...</p>
    </div>
  </div>
</main>

<script>
let allHistoryData = [];

async function loadHistory() {
  try {
    const res  = await fetch('/api/history');
    const data = await res.json();
    
    // Parse company name from title (e.g. "Software Engineer at Google" -> "Google")
    allHistoryData = data.map(row => {
      let company = "Unknown Company";
      let cleanTitle = row.title || "Untitled Job";
      const match = cleanTitle.match(/\s+at\s+(.+)$/i);
      if (match) {
        company = match[1].trim();
        cleanTitle = cleanTitle.replace(/\s+at\s+(.+)$/i, "").trim();
      }
      
      const prob = typeof row.probability === 'number' ? row.probability : parseFloat(row.probability);
      const confPct = prob * 100;
      
      let status = 'safe';
      if (row.prediction_label === 'Fraudulent') {
        status = confPct < 60 ? 'uncertain' : 'fraud';
      }
      
      return { ...row, cleanTitle, company, prob, confPct, status };
    });
    
    applyFilters();
  } catch(e) {
    document.getElementById('historyGrid').innerHTML =
      `<div class="empty-state">
         <div class="empty-icon">❌</div>
         <p style="color:var(--red)">Failed to load history. Make sure Flask is running.</p>
       </div>`;
  }
}

function applyFilters() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  const statusFilter = document.getElementById('statusFilter').value;
  const sortFilter = document.getElementById('sortFilter').value;
  
  let filtered = allHistoryData.filter(row => {
    const matchSearch = row.cleanTitle.toLowerCase().includes(searchTerm) || 
                        row.company.toLowerCase().includes(searchTerm) ||
                        (row.description && row.description.toLowerCase().includes(searchTerm));
    
    let matchStatus = true;
    if (statusFilter !== 'all') {
      matchStatus = row.status === statusFilter;
    }
    
    return matchSearch && matchStatus;
  });
  
  filtered.sort((a, b) => {
    if (sortFilter === 'newest') return b.id - a.id;
    if (sortFilter === 'oldest') return a.id - b.id;
    if (sortFilter === 'highest_conf') return b.confPct - a.confPct;
    if (sortFilter === 'lowest_conf') return a.confPct - b.confPct;
    return 0;
  });
  
  renderCards(filtered);
  updateStats();
}

function renderCards(rows) {
  const grid = document.getElementById('historyGrid');
  if (!rows.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <p>No scans found matching your criteria.</p>
        <a href="/analyze" class="btn-new">Analyze a Job →</a>
      </div>`;
    return;
  }

  grid.innerHTML = rows.map(row => {
    const preview = row.description
      ? (row.description.length > 120 ? row.description.substring(0,120) + '...' : row.description)
      : 'No description provided.';
      
    const conf = row.confPct.toFixed(1) + '%';
    
    let badgeHtml = '';
    let cardClass = '';
    let valClass = '';
    
    if (row.status === 'fraud') {
      badgeHtml = '<span class="badge badge-fraud">⚠️ Fraudulent</span>';
      cardClass = 'card-fraud'; valClass = 'val-fraud';
    } else if (row.status === 'uncertain') {
      badgeHtml = '<span class="badge badge-uncertain">🤔 Uncertain</span>';
      cardClass = 'card-uncertain'; valClass = 'val-uncertain';
    } else {
      badgeHtml = '<span class="badge badge-safe">✅ Genuine</span>';
      cardClass = 'card-safe'; valClass = 'val-safe';
    }
    
    let dateStr = row.created_at || 'Unknown Date';
    if (dateStr !== 'Unknown Date') {
        try {
            const d = new Date(dateStr);
            if (!isNaN(d)) {
                dateStr = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }
        } catch(e){}
    }

    return `
      <div class="history-card ${cardClass}">
        <button class="delete-btn" onclick="deleteScan(${row.id})" title="Delete scan">✕</button>
        <div class="card-header">
          <div>
            <div class="job-title">${row.cleanTitle}</div>
            <div class="company-name">🏢 ${row.company}</div>
          </div>
          ${badgeHtml}
        </div>
        
        <div class="card-body">
          "${preview}"
        </div>
        
        <div class="card-footer">
          <div class="footer-col">
            <span class="meta-label">Confidence</span>
            <span class="meta-value ${valClass}">${conf}</span>
          </div>
          <div class="footer-col" style="align-items: flex-end;">
            <span class="meta-label">Model: ${row.model_used || 'N/A'}</span>
            <span class="timestamp">${dateStr}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

function updateStats() {
  let fraud = 0, safe = 0, uncertain = 0;
  allHistoryData.forEach(r => {
    if (r.status === 'fraud') fraud++;
    else if (r.status === 'safe') safe++;
    else uncertain++;
  });
  
  let html = `
    <div class="stat-badge">Total <strong>${allHistoryData.length}</strong></div>
    <div class="stat-badge">Fraudulent <strong style="color:var(--red)">${fraud}</strong></div>
    <div class="stat-badge">Genuine <strong style="color:var(--green)">${safe}</strong></div>
  `;
  if (uncertain > 0) {
    html += `<div class="stat-badge">Uncertain <strong style="color:#FFC800">${uncertain}</strong></div>`;
  }
  document.getElementById('statsBar').innerHTML = html;
}

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('statusFilter').addEventListener('change', applyFilters);
document.getElementById('sortFilter').addEventListener('change', applyFilters);

async function deleteScan(scanId) {
  if (!confirm('Delete this scan from history?')) return;
  try {
    await fetch('/api/history/' + scanId, { method: 'DELETE' });
    allHistoryData = allHistoryData.filter(r => r.id !== scanId);
    applyFilters();
  } catch(e) {
    alert('Failed to delete scan.');
  }
}

loadHistory();
</script>
</body>
</html>
